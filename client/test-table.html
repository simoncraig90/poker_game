<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Relax Poker - Test Table</title>
<style>
  body { background: #1a1a1a; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
  #table { background: #0a4a0a; border-radius: 200px; width: 600px; height: 300px; margin: 50px auto; position: relative; }
  #log { background: #000; color: #0f0; padding: 10px; height: 200px; overflow-y: scroll; font-family: monospace; font-size: 12px; }
  #buttons { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
  .btn { padding: 20px 40px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; color: #fff; }
  #fold { background: #c83232; }
  #call { background: #d4a017; }
  #raise { background: #2eb82e; }
  #slider-row { display: flex; justify-content: center; gap: 5px; margin: 10px 0; }
  .preset { padding: 8px 15px; background: #333; color: #ccc; border: none; cursor: pointer; }
  .preset:hover { background: #555; }
  #bet-input-row { display: flex; justify-content: center; gap: 5px; align-items: center; margin: 10px 0; }
  #bet-input { width: 100px; padding: 8px; font-size: 16px; text-align: center; background: #fff; color: #000; }
  .pm-btn { padding: 8px 15px; background: #333; color: #fff; border: none; cursor: pointer; }
  #status { text-align: center; padding: 10px; font-size: 14px; }
  h1 { text-align: center; color: #0f0; }
</style>
</head>
<body>
<h1>RELAX POKER - TEST TABLE</h1>
<div id="status">Last action: <span id="last-action">none</span> | Total clicks: <span id="click-count">0</span></div>

<div id="table">
  <canvas id="kenobiCanvas" width="600" height="300" tabindex="-1" style="display:block;background:#0a4a0a;border-radius:200px;"></canvas>
</div>

<div id="slider-row">
  <button class="preset" data-pct="25">25%</button>
  <button class="preset" data-pct="50">50%</button>
  <button class="preset" data-pct="80">80%</button>
  <button class="preset" data-pct="100">All-in</button>
</div>

<div id="bet-input-row">
  <button class="pm-btn" id="minus">−</button>
  <input id="bet-input" type="text" value="0.10">
  <button class="pm-btn" id="plus">+</button>
</div>

<div id="buttons">
  <button class="btn" id="fold">FOLD</button>
  <button class="btn" id="call">CALL <span id="call-amt">€0.04</span></button>
  <button class="btn" id="raise">RAISE</button>
</div>

<h3>Click Log:</h3>
<div id="log"></div>

<script>
let clickCount = 0;
const log = document.getElementById('log');
const lastAction = document.getElementById('last-action');
const clickCountEl = document.getElementById('click-count');

function addLog(msg, color = '#0f0') {
  const time = new Date().toISOString().slice(11, 23);
  const div = document.createElement('div');
  div.style.color = color;
  div.textContent = `[${time}] ${msg}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  clickCount++;
  clickCountEl.textContent = clickCount;
}

function logAction(action, detail = '') {
  lastAction.textContent = action + (detail ? ' ' + detail : '');
  addLog(`${action} ${detail}`);
}

document.getElementById('fold').addEventListener('click', () => logAction('FOLD'));
document.getElementById('call').addEventListener('click', () => logAction('CALL', '€0.04'));
document.getElementById('raise').addEventListener('click', () => {
  const amt = document.getElementById('bet-input').value;
  logAction('RAISE', `to €${amt}`);
});

document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => {
    const pct = btn.dataset.pct;
    const newAmt = (0.04 * (pct / 25)).toFixed(2);
    document.getElementById('bet-input').value = newAmt;
    addLog(`SLIDER ${pct}% → €${newAmt}`, '#ff0');
  });
});

document.getElementById('plus').addEventListener('click', () => {
  const input = document.getElementById('bet-input');
  input.value = (parseFloat(input.value) + 0.02).toFixed(2);
  addLog(`+ → €${input.value}`, '#ff0');
});
document.getElementById('minus').addEventListener('click', () => {
  const input = document.getElementById('bet-input');
  input.value = Math.max(0.04, parseFloat(input.value) - 0.02).toFixed(2);
  addLog(`− → €${input.value}`, '#ff0');
});

document.getElementById('bet-input').addEventListener('change', (e) => {
  addLog(`INPUT CHANGED → €${e.target.value}`, '#ff0');
});
document.getElementById('bet-input').addEventListener('input', (e) => {
  addLog(`INPUT TYPED → €${e.target.value}`, '#fa0');
});

// Also log raw clicks on the canvas to show coordinate detection
document.getElementById('kenobiCanvas').addEventListener('click', (e) => {
  const rect = e.target.getBoundingClientRect();
  addLog(`CANVAS CLICK at (${Math.round(e.clientX - rect.left)}, ${Math.round(e.clientY - rect.top)})`, '#0ff');
});

addLog('Test table ready. Buttons logged below.');
</script>
</body>
</html>
