<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; padding: 16px; }

  h1 { font-size: 16px; color: #4ecca3; margin-bottom: 12px; }

  /* Config panel */
  #config { background: #16213e; padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 2px; }
  .field label { font-size: 10px; color: #888; text-transform: uppercase; }
  .field input, .field select { padding: 5px 8px; border: 1px solid #444; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; font-family: inherit; font-size: 12px; width: 120px; }
  .field select { width: 140px; }

  button { padding: 6px 16px; border: 1px solid #444; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; cursor: pointer; font-family: inherit; font-size: 12px; }
  button:hover:not(:disabled) { background: #2a2a4e; border-color: #4ecca3; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  #start-btn { background: #2d6a4f; border-color: #4ecca3; color: #4ecca3; font-weight: bold; }
  #stop-btn { background: #6a2d2d; border-color: #e44; color: #e4b7b7; }
  #seat-btn { background: #4a3f00; border-color: #ffd700; color: #ffd700; }

  /* Status */
  #status-bar { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; font-size: 12px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .status-dot.on { background: #4ecca3; }
  .status-dot.off { background: #6a2d2d; }
  .stat { color: #888; }
  .stat span { color: #ffd700; }

  /* Log */
  #log-area { background: #111; border: 1px solid #333; border-radius: 8px; padding: 8px 12px; height: 400px; overflow-y: auto; font-size: 11px; line-height: 1.6; }
  .log-line { border-bottom: 1px solid #1a1a1a; padding: 1px 0; }
  .log-line .ts { color: #555; margin-right: 6px; }
  .log-line .tag { font-weight: bold; margin-right: 4px; }
  .tag-info { color: #4ecca3; }
  .tag-action { color: #ffd700; }
  .tag-event { color: #8ecae6; }
  .tag-error { color: #e44; }
  .tag-state { color: #c084fc; }

  /* Multi-bot panel */
  #multi-panel { background: #16213e; padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; }
  #multi-panel h2 { font-size: 13px; color: #888; margin-bottom: 8px; }
  .bot-row { display: flex; gap: 8px; align-items: center; padding: 4px 0; border-bottom: 1px solid #222; font-size: 11px; }
  .bot-row .bot-name { color: #4ecca3; width: 80px; }
  .bot-row .bot-seat { color: #888; width: 50px; }
  .bot-row .bot-status { width: 80px; }
  .bot-row .bot-hands { color: #ffd700; }
</style>
</head>
<body>

<h1>Poker Bot Control Panel</h1>

<div id="config">
  <div class="field">
    <label>Bot Name</label>
    <input id="bot-name" value="Bot-1" />
  </div>
  <div class="field">
    <label>Seat</label>
    <select id="bot-seat">
      <option value="0">Seat 0</option>
      <option value="1">Seat 1</option>
      <option value="2" selected>Seat 2</option>
      <option value="3">Seat 3</option>
      <option value="4">Seat 4</option>
      <option value="5">Seat 5</option>
    </select>
  </div>
  <div class="field">
    <label>Buy-in</label>
    <input id="bot-buyin" type="number" value="1000" />
  </div>
  <div class="field">
    <label>Style</label>
    <select id="bot-style">
      <option value="TAG">Tight-Aggressive</option>
      <option value="LAG">Loose-Aggressive</option>
      <option value="ROCK">Rock (ultra tight)</option>
      <option value="FISH">Fish (loose passive)</option>
    </select>
  </div>
  <div class="field">
    <label>Think Delay (ms)</label>
    <input id="bot-delay" type="number" value="800" min="0" max="5000" />
  </div>
  <button id="seat-btn" onclick="seatBot()">Seat Bot</button>
  <button id="start-btn" onclick="startBot()">Start Bot</button>
  <button id="stop-btn" onclick="stopBot()" disabled>Stop Bot</button>
  <button onclick="clearLog()">Clear Log</button>
</div>

<div id="multi-panel">
  <h2>Quick Multi-Bot Setup</h2>
  <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
    <div class="field">
      <label>Number of Bots</label>
      <input id="multi-count" type="number" value="3" min="2" max="6" style="width:60px" />
    </div>
    <button onclick="spawnMultiBots()">Spawn & Seat All</button>
    <button onclick="startAllBots()">Start All</button>
    <button onclick="stopAllBots()">Stop All</button>
    <div class="field">
      <label>Auto-deal</label>
      <select id="auto-deal">
        <option value="off">Off</option>
        <option value="on" selected>On</option>
      </select>
    </div>
  </div>
  <div id="bot-roster"></div>
</div>

<div id="status-bar">
  <div><span class="status-dot off" id="ws-dot"></span><span id="ws-label">Disconnected</span></div>
  <div class="stat">Hands played: <span id="hands-count">0</span></div>
  <div class="stat">Actions taken: <span id="actions-count">0</span></div>
  <div class="stat">Session: <span id="session-label">--</span></div>
</div>

<div id="log-area"></div>

<script src="bot.js"></script>
</body>
</html>
